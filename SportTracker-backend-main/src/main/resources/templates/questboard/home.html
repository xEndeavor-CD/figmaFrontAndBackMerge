<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Board | Sports Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Caveat:wght@400;700&display=swap');

        body {
            background-color: #E8E0D0;
            color: #1a1a1a;
            font-family: 'Caveat', cursive;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .heading-font {
            font-family: 'Bangers', cursive;
            font-weight: normal;
            letter-spacing: 2px;
            margin: 0;
        }

        .nav {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav a {
            font-family: 'Bangers', cursive;
            color: #1a1a1a;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 1.3rem;
            position: relative;
        }

        .nav a::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: #1a1a1a;
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;
            transform-origin: bottom right;
        }

        .nav a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        .btn {
            border-radius: 50px;
            padding: 10px 28px;
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        .btn-solid {
            background: #1a1a1a;
            color: #E8E0D0;
            border: 2px solid #1a1a1a;
        }

        .btn-outline {
            background: transparent;
            color: #1a1a1a;
            border: 2px solid #1a1a1a;
        }

        .top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            font-size: 1.4rem;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 5% 60px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        .header-section {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 5rem;
            line-height: 1;
        }

        .subtitle {
            font-size: 2rem;
            margin-top: -10px;
        }

        .desc {
            font-size: 1.6rem;
            max-width: 600px;
            margin: 20px auto;
            line-height: 1.3;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 50px;
        }

        .illustration {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .illustration svg {
            width: 100%;
            height: auto;
            transition: transform 0.3s;
        }

        .illustration svg:hover {
            transform: scale(1.02);
        }

        @media (max-width: 900px) {
            .illustration { display: none; }
            .nav { position: static; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
            .top-left { position: static; margin-top: 20px; }
            .footer { position: static; flex-direction: column; gap: 10px; align-items: center; margin-top: auto; padding-bottom: 20px; }
            h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

<a href="/" class="btn btn-outline top-left">← Back</a>

<div class="nav">
    <a href="/quests">Quests</a>
    <a href="/leaderboard">Leaderboard</a>
    <a href="/submissions">Submissions</a>
    <a href="/about">About</a>
    <a href="/arena" class="btn btn-outline" style="margin-left: 10px;">THE ARENA →</a>
</div>

<div class="container">
    <div class="header-section">
        <h1 class="heading-font">QUEST BOARD</h1>
        <div class="subtitle">three paths. one champion.</div>
        <div class="desc">
            Embark on daily challenges, weekly grinds, and epic milestones.<br>
            Earn points, climb the ranks, and prove your dedication.
        </div>
        <div class="action-buttons">
            <a href="/quests/start" class="btn btn-solid">Start a Quest</a>
            <a href="/leaderboard" class="btn btn-outline">View Leaderboard</a>
        </div>
    </div>

                    <circle cx="80" cy="220" r="4" fill="#1a1a1a"/>

                    <path d="M 40 75 L 80 75" stroke-width="2" stroke-dasharray="4 4"/>
                </g>

                <g transform="translate(730, 80)">
                    <path d="M 0 270 L 0 100 C 0 30, 120 30, 120 100 L 120 270 Z" />
                    <circle cx="60" cy="120" r="40" stroke-dasharray="15 10"/>
                    <circle cx="60" cy="120" r="30"/>
                    <path d="M 60 90 L 75 135 L 35 105 L 85 105 L 45 135 Z" stroke-width="2"/> <path d="M 60 200 C 40 220, 80 240, 60 260" /> <path d="M 20 180 L 30 160 L 40 180 L 30 210 Z" />
                    <path d="M 80 200 L 90 180 L 100 200 L 90 230 Z" />
                </g>

                <g transform="translate(380, 220)">
                    <circle cx="20" cy="20" r="15"/> <line x1="20" y1="35" x2="20" y2="90"/> <line x1="20" y1="90" x2="5" y2="130"/> <line x1="20" y1="90" x2="35" y2="130"/> <line x1="20" y1="50" x2="5" y2="70"/> <polyline points="20,50 35,60 30,30 22,25"/> <path d="M 40 -10 C 50 -20, 60 -10, 50 0 L 50 10 M 50 20 L 50 22" stroke-width="3"/>
                    <path d="M 0 5 C -10 -5, -20 5, -10 15 L -10 20 M -10 25 L -10 27" stroke-width="2"/>
                </g>
            </g>

            <text x="500" y="380" font-family="'Bangers', cursive" font-size="32" fill="#1a1a1a" text-anchor="middle" letter-spacing="2">CHOOSE YOUR DOOR</text>
            <text x="500" y="400" font-family="'Caveat', cursive" font-size="20" fill="#1a1a1a" text-anchor="middle">three paths. one champion.</text>
        </svg>
    </div>
</div>

<div class="footer">
    <div>© 2026 Nest & Build</div>
    <div>SEASON 01 · NOW LIVE</div>
</div>

</body>
</html>
