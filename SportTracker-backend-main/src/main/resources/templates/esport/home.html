<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Tracker | Sports Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Caveat:wght@400;700&display=swap');

        body {
            background-color: #E8E0D0;
            color: #1a1a1a;
            font-family: 'Caveat', cursive;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .heading-font {
            font-family: 'Bangers', cursive;
            font-weight: normal;
            letter-spacing: 2px;
            margin: 0;
        }

        .nav {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 10;
        }

        .nav a {
            font-family: 'Bangers', cursive;
            color: #1a1a1a;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 1.3rem;
            position: relative;
        }

        .nav a::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: #1a1a1a;
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;
            transform-origin: bottom right;
        }

        .nav a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        .btn {
            border-radius: 50px;
            padding: 10px 28px;
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .btn-solid {
            background: #1a1a1a;
            color: #E8E0D0;
            border: 2px solid #1a1a1a;
        }

        .btn-outline {
            background: transparent;
            color: #1a1a1a;
            border: 2px solid #1a1a1a;
        }

        .top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            font-size: 1.4rem;
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 5%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .content {
            flex: 1;
            z-index: 2;
        }

        h1 {
            font-size: 5rem;
            line-height: 1;
        }

        .subtitle {
            font-size: 2.2rem;
            margin-top: -10px;
        }

        .desc {
            font-size: 1.6rem;
            max-width: 500px;
            margin: 20px 0;
            line-height: 1.3;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .illustration {
            flex: 1;
            text-align: right;
            z-index: 1;
        }

        .illustration svg {
            width: 100%;
            max-width: 600px;
            height: auto;
            transition: transform 0.3s;
        }

        .illustration svg:hover {
            transform: scale(1.05);
        }

        @media (max-width: 900px) {
            .illustration { display: none; }
            .container { flex-direction: column; text-align: center; padding-top: 120px; }
            .nav { position: static; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
            .top-left { position: static; margin-top: 20px; }
            .footer { position: static; flex-direction: column; gap: 10px; align-items: center; margin-top: auto; padding-bottom: 20px; }
            .action-buttons { justify-content: center; }
            .desc { margin: 20px auto; }
            h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

<a href="/" class="btn btn-outline top-left">← Back</a>

<div class="nav">
    <a href="/teams">Teams</a>
    <a href="/matches">Matches</a>
    <a href="/tournaments">Tournaments</a>
    <a href="/about">About</a>
    <a href="/arena" class="btn btn-outline" style="margin-left: 10px;">THE ARENA →</a>
</div>

<div class="container">
    <div class="content">
        <h1 class="heading-font">ESPORTS TRACKER</h1>
        <div class="subtitle">where legends go digital.</div>
        <div class="desc">
            Follow live brackets, track team rosters, and never miss a clutch moment in the digital arena.
        </div>
        <div class="action-buttons">
            <a href="/tournaments/join" class="btn btn-solid">Join the League</a>
            <a href="/matches" class="btn btn-outline">Watch Matches</a>
        </div>
    </div>

    <div class="illustration">
        <svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
            <g fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">

                <g opacity="0.4" stroke-width="2">
                    <path d="M 300 100 C 450 150, 500 350, 300 450 C 100 550, 50 250, 200 150 C 350 50, 450 250, 350 350 C 250 450, 150 350, 250 250 C 300 200, 350 250, 300 300"/>
                    <circle cx="300" cy="300" r="220" stroke-dasharray="10 20"/>
                    <circle cx="300" cy="300" r="160" stroke-dasharray="20 40"/>
                </g>

                <g stroke-width="3">
                    <g transform="translate(100, 120) rotate(-15)">
                        <rect x="0" y="0" width="100" height="40" rx="5"/>
                        <line x1="10" y1="10" x2="90" y2="10"/>
                        <line x1="10" y1="20" x2="90" y2="20"/>
                        <line x1="10" y1="30" x2="90" y2="30"/>
                        <line x1="30" y1="5" x2="30" y2="35"/>
                        <line x1="70" y1="5" x2="70" y2="35"/>
                    </g>

                    <g transform="translate(400, 400) rotate(25)">
                        <path d="M 20 50 C -10 20, 20 -10, 50 20 L 70 20 C 100 -10, 130 20, 100 50 C 90 70, 70 60, 60 40 L 60 40 C 50 60, 30 70, 20 50 Z" />
                        <circle cx="35" cy="25" r="5"/>
                        <circle cx="85" cy="25" r="5"/>
                        <line x1="55" y1="10" x2="65" y2="10"/>
                    </g>
                </g>

                <g transform="translate(250, 200)">
                    <circle cx="50" cy="30" r="30"/> <line x1="50" y1="60" x2="50" y2="180"/> <line x1="50" y1="180" x2="10" y2="280"/> <line x1="50" y1="180" x2="90" y2="280"/> <polyline points="50,90 20,120 30,150"/> <polyline points="50,90 80,120 70,150"/> <rect x="25" y="140" width="50" height="25" rx="10"/>
                    <circle cx="35" cy="152" r="3"/>
                    <circle cx="65" cy="152" r="3"/>

                    <path d="M 10 10 L 0 0 M 90 10 L 100 0"/>
                    <path d="M 20 30 C 20 -10, 80 -10, 80 30" stroke-width="5"/>
                    <rect x="15" y="20" width="10" height="20" rx="3"/>
                    <rect x="75" y="20" width="10" height="20" rx="3"/>
                    <line x1="20" y1="35" x2="35" y2="45" stroke-width="3"/> </g>
            </g>
        </svg>
    </div>
</div>

<div class="footer">
    <div>© 2026 Nest & Build</div>
    <div>SEASON 01 · NOW LIVE</div>
</div>

</body>
</html>
