<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Tracker | Sports Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Caveat:wght@400;700&display=swap');

        body {
            background-color: #E8E0D0;
            color: #1a1a1a;
            font-family: 'Caveat', cursive;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .heading-font {
            font-family: 'Bangers', cursive;
            font-weight: normal;
            letter-spacing: 2px;
            margin: 0;
        }

        .nav {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 10;
        }

        .nav a {
            font-family: 'Bangers', cursive;
            color: #1a1a1a;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 1.3rem;
            position: relative;
        }

        .nav a::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: #1a1a1a;
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;
            transform-origin: bottom right;
        }

        .nav a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        .btn {
            border-radius: 50px;
            padding: 10px 28px;
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn:hover {
            transform: scale(1.05) translateY(-2px);
        }

        .btn-solid {
            background: #1a1a1a;
            color: #E8E0D0;
            border: 2px solid #1a1a1a;
        }

        .btn-outline {
            background: transparent;
            color: #1a1a1a;
            border: 2px solid #1a1a1a;
        }

        .top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            font-size: 1.4rem;
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 5%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .content {
            flex: 1;
            z-index: 2;
        }

        h1 {
            font-size: 5rem;
            line-height: 1;
        }

        .subtitle {
            font-size: 2.2rem;
            margin-top: -10px;
        }

        .desc {
            font-size: 1.6rem;
            max-width: 500px;
            margin: 20px 0;
            line-height: 1.3;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .illustration {
            flex: 1;
            text-align: right;
            z-index: 1;
        }

        .illustration svg {
            width: 100%;
            max-width: 600px;
            height: auto;
            transition: transform 0.3s;
        }

        .illustration svg:hover {
            transform: scale(1.05);
        }

        @media (max-width: 900px) {
            .illustration { display: none; }
            .container { flex-direction: column; text-align: center; padding-top: 120px; }
            .nav { position: static; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
            .top-left { position: static; margin-top: 20px; }
            .footer { position: static; flex-direction: column; gap: 10px; align-items: center; margin-top: auto; padding-bottom: 20px; }
            .action-buttons { justify-content: center; }
            .desc { margin: 20px auto; }
            h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

<a href="/" class="btn btn-outline top-left">← Back</a>

<div class="nav">
    <a href="/leagues">Leagues</a>
    <a href="/fixtures">Fixtures</a>
    <a href="/standings">Standings</a>
    <a href="/about">About</a>
    <a href="/arena" class="btn btn-outline" style="margin-left: 10px;">THE ARENA →</a>
</div>

        <div class="action-buttons">

                    <polyline points="50,90 90,110 120,80"/> <line x1="50" y1="160" x2="20" y2="260"/> <polyline points="50,160 80,210 140,230"/> <g transform="translate(160, 210)">
                    <circle cx="30" cy="30" r="25"/>

        </svg>
    </div>
</div>

<div class="footer">
    <div>© 2026 Nest & Build</div>

</div>
