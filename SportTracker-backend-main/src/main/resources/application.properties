spring.application.name=SportsTracker

# ?????????????????????????????????????????
#  SportsTracker - Application Properties
# ?????????????????????????????????????????

# ??? SERVER ???
server.port=8080

# ??? MONGODB ???
spring.data.mongodb.uri=mongodb+srv://user:1234@cluster0.kruix3h.mongodb.net/?appName=Cluster0
spring.data.mongodb.database=sport_tracker_db

# ??? SPRING SESSION (MongoDB backed) ???
spring.session.store-type=mongodb
spring.session.mongodb.collection-name=sessions
spring.session.timeout=3600

# ??? THYMELEAF ???
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ??? FILE UPLOAD (Member A - quest proof) ???
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ??? SWAGGER / OPENAPI ???
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ??? LOGGING ???
logging.level.org.springframework.security=DEBUG
logging.level.com.tournamenttracker=DEBUG